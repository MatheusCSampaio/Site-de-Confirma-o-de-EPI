<!DOCTYPE html>
<html lang="PT_BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Retirada de EPI - Almoxerifado</title>
        <link rel="stylesheet" href="estilo.css">
        <link rel="manifest" href="manifest.json">
    </head>
    <body>

        <div id="caixa-principal">
            <h2>Controle de Retirada de EPI</h2>

            <form id="formulario-epi">
                <label for="nome-funcionario">Nome completo do Funcionário:</label>
                <input type="text" id="nome-funcionario" required placeholder="Ex: Matheus Cavalcante Sampaio">

                <label for="Lista-epis">Equipamento Retirado (Segure Ctrl para selecionar mais de um):</label>

                <input type="text" id="busca-epi" placeholder="Pesquisar EPI..." style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

                <select id="Lista-epis" required multiple size="4">
                    <option value="avental">Avental PVC</option>
                    <option value="balaclava">Balaclava tam M</option>
                    <option value="balaclava">Balaclava tam G</option>
                    <option value="bandeirola">Bandeirola para escada</option>
                    <option value="bolsacapacete">Bolsa de Capacete</option>
                    <option value="Camiseta">CamisetaFR tam P</option>
                    <option value="Abafador">Protetor Auricular (Abafador)</option>
                    <option value="Bota">Botina de Segurança</option>
                    <option value="Calça">CalçaFR</option>
                </select>

                <label for ="quantidade-epi">Quantidade Retirada:</label>
                <input type="number" id="quantidade-epi" min="1" max="100" value="1" required>

                <label>assine na área abaixo:</label>
                <canvas id="quadrado-assinatura" width="400" height="150"></canvas>

                <button type="button" id="botão-limpar">Limpar Assinatura</button>
                <button type="submit" id="botão-enviar">Confirmar Retirada</button>
                </form>
            </div>
        <script src="logica.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('PWA registrado com sucesso'))
                    .catch(erro => console.log('Erro ao registrar PWA:', erro));
            }
        </script>   
    </body>
</html>
